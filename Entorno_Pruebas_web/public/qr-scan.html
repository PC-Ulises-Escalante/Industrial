<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Escaneo QR - Semana Académica ITT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --cyan: #22d3ee;
      --cyan-dim: rgba(34, 211, 238, 0.15);
      --purple: #a855f7;
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.15);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.15);
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2744 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: var(--slate-300);
    }

    /* Particles background */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--cyan);
      border-radius: 50%;
      opacity: 0.3;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      50% { transform: translateY(-30px) translateX(15px); opacity: 0.6; }
    }

    /* Logo */
    .logo-container {
      margin-bottom: 2rem;
      text-align: center;
      animation: fadeInDown 0.6s ease-out both;
      position: relative;
      z-index: 1;
    }

    .logo-img {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 0.75rem;
      box-shadow: 0 0 40px rgba(34, 211, 238, 0.3);
    }

    .logo-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin-top: 1rem;
      letter-spacing: 0.02em;
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 0.7s ease-out 0.1s both;
    }

    .card-glow {
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.1), rgba(168, 85, 247, 0.05));
      pointer-events: none;
      z-index: -1;
    }

    /* Header icon */
    .icon-container {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--cyan-dim);
      border: 2px solid rgba(34, 211, 238, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); }
    }

    .icon-container svg {
      width: 40px;
      height: 40px;
      color: var(--cyan);
    }

    /* Title and subtitle */
    .card-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .card-subtitle {
      font-size: 0.95rem;
      color: var(--slate-400);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* Status message */
    .status-container {
      padding: 1.25rem;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      text-align: center;
      transition: all 0.4s ease;
    }

    .status-container.loading {
      background: var(--cyan-dim);
      border: 1px solid rgba(34, 211, 238, 0.2);
    }

    .status-container.success {
      background: var(--green-dim);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .status-container.error {
      background: var(--red-dim);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .status-container.hidden {
      display: none;
    }

    .status-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .status-text {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.5;
    }

    .status-container.loading .status-text {
      color: var(--cyan);
    }

    .status-container.success .status-text {
      color: var(--green);
    }

    .status-container.error .status-text {
      color: var(--red);
    }

    /* Loading spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(34, 211, 238, 0.2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Resource info */
    .info-box {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      font-size: 0.85rem;
    }

    .info-row:not(:last-child) {
      border-bottom: 1px solid var(--glass-border);
    }

    .info-label {
      color: var(--slate-500);
    }

    .info-value {
      color: var(--slate-300);
      font-weight: 600;
      font-family: monospace;
      font-size: 0.8rem;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      min-height: 48px;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), #06b6d4);
      color: var(--bg-dark);
      box-shadow: 0 8px 24px rgba(34, 211, 238, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(34, 211, 238, 0.35);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      color: var(--slate-300);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      text-align: center;
      color: var(--slate-500);
      font-size: 0.8rem;
      position: relative;
      z-index: 1;
    }

    .footer a {
      color: var(--cyan);
      text-decoration: none;
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }

      .card {
        padding: 1.75rem 1.25rem;
        border-radius: 20px;
      }

      .icon-container {
        width: 64px;
        height: 64px;
      }

      .icon-container svg {
        width: 32px;
        height: 32px;
      }

      .card-title {
        font-size: 1.5rem;
      }

      .logo-img {
        width: 80px;
        height: 80px;
      }
    }
  </style>
  <script>
    function parsePath() {
      const parts = location.pathname.split('/').filter(Boolean);
      return { resource: parts[2] || '', token: parts[3] || '' };
    }

    async function doScan() {
      const { resource, token } = parsePath();
      if (!resource || !token) {
        renderError('URL inválida. Falta información del recurso o token.');
        return;
      }

      renderLoading();

      const apiPath = `/api/${resource}/qr/scan/${token}`;

      try {
        const fetchOpts = {
          method: 'POST',
          credentials: 'include',
          headers: {}
        };

        try {
          const savedToken = localStorage.getItem('token');
          if (savedToken) fetchOpts.headers['Authorization'] = 'Bearer ' + savedToken;
        } catch (e) {}

        const res = await fetch(apiPath, fetchOpts);

        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          renderSuccess(data.message || '¡Asistencia registrada correctamente!');
        } else if (res.status === 401) {
          renderError('Debes iniciar sesión primero. Inicia sesión en la página principal y vuelve a escanear el QR.');
        } else {
          const data = await res.json().catch(() => ({}));
          renderError(data.error || `Error ${res.status}: No se pudo registrar la asistencia.`);
        }
      } catch (err) {
        renderError('Error de conexión. Verifica tu internet e intenta de nuevo.');
      }
    }

    function renderLoading() {
      const container = document.getElementById('status-container');
      container.className = 'status-container loading';
      container.innerHTML = `
        <div class="spinner"></div>
        <p class="status-text">Registrando asistencia...</p>
      `;
      document.getElementById('actions').innerHTML = '';
    }

    function renderSuccess(msg) {
      const container = document.getElementById('status-container');
      container.className = 'status-container success';
      container.innerHTML = `
        <div class="status-icon">✓</div>
        <p class="status-text">${msg}</p>
      `;
      document.getElementById('actions').innerHTML = `
        <a href="/" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Regresar al Inicio
        </a>
      `;
    }

    function renderError(msg) {
      const container = document.getElementById('status-container');
      container.className = 'status-container error';
      container.innerHTML = `
        <div class="status-icon">✗</div>
        <p class="status-text">${msg}</p>
      `;
      document.getElementById('actions').innerHTML = `
        <button id="retry" class="btn btn-primary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Reintentar
        </button>
        <a href="/" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Regresar al Inicio
        </a>
      `;
      document.getElementById('retry').addEventListener('click', doScan);
    }

    // Particles
    function createParticles() {
      const container = document.querySelector('.particles');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `
          top: ${Math.random() * 100}%;
          left: ${Math.random() * 100}%;
          --duration: ${Math.random() * 6 + 4}s;
          --delay: ${Math.random() * 4}s;
        `;
        container.appendChild(p);
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      createParticles();

      const { resource, token } = parsePath();
      document.getElementById('resource').textContent = resource || '[desconocido]';
      document.getElementById('token').textContent = token ? (token.substring(0, 16) + '...') : '[desconocido]';

      doScan();
    });
  </script>
</head>
<body>
  <div class="particles" aria-hidden="true"></div>

  <div class="logo-container">
    <img src="/Semana.png" alt="Semana Académica" class="logo-img">
    <p class="logo-title">Semana Académica 2026</p>
  </div>

  <main class="card">
    <div class="card-glow"></div>

    <div class="icon-container">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
    </div>

    <h1 class="card-title">Registro de Asistencia</h1>
    <p class="card-subtitle">Escanea el código QR después de tu actividad para registrar tu participación.</p>

    <div id="status-container" class="status-container loading hidden">
      <div class="spinner"></div>
      <p class="status-text">Iniciando...</p>
    </div>

    <div class="info-box">
      <div class="info-row">
        <span class="info-label">Recurso</span>
        <span class="info-value" id="resource">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Token</span>
        <span class="info-value" id="token">—</span>
      </div>
    </div>

    <div id="actions" class="actions"></div>
  </main>

  <footer class="footer">
    <p>Instituto Tecnológico de Tijuana — Ingeniería Industrial</p>
  </footer>
</body>
</html>
